<svg viewBox="0 0 600 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: Inter, system-ui, sans-serif; }
  </style>

  <!-- Strategic steps (top row) -->
  <rect x="10" y="30" width="120" height="36" rx="6" fill="#6BA5F2"/>
  <text x="70" y="53" text-anchor="middle" fill="white" font-size="11" font-weight="600">Standortbestimmung</text>
  <text x="138" y="53" fill="#6BA5F2" font-size="9" font-weight="500">1h</text>

  <rect x="170" y="30" width="90" height="36" rx="6" fill="#6BA5F2"/>
  <text x="215" y="53" text-anchor="middle" fill="white" font-size="11" font-weight="600">Workshop</text>
  <text x="268" y="53" fill="#6BA5F2" font-size="9" font-weight="500">4–6h</text>

  <rect x="310" y="30" width="120" height="36" rx="6" fill="#6BA5F2"/>
  <text x="370" y="53" text-anchor="middle" fill="white" font-size="11" font-weight="600">Prozessplanung</text>
  <text x="438" y="53" fill="#6BA5F2" font-size="9" font-weight="500">2–4h</text>

  <rect x="480" y="30" width="100" height="36" rx="6" fill="#6BA5F2"/>
  <text x="530" y="53" text-anchor="middle" fill="white" font-size="11" font-weight="600">Feedback</text>
  <text x="588" y="53" fill="#6BA5F2" font-size="9" font-weight="500">2–4h</text>

  <!-- Implementation tracks (gray) -->
  <rect x="120" y="85" width="140" height="32" rx="6" fill="#E5E7EB"/>
  <text x="190" y="105" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="500">Private KI Anbindung</text>
  <text x="268" y="105" fill="#9CA3AF" font-size="9">1M</text>

  <!-- Ongoing: model updates -->
  <line x1="290" y1="101" x2="590" y2="101" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="390" y="96" fill="#9CA3AF" font-size="9">Fortlaufende Modell Updates</text>

  <rect x="200" y="130" width="120" height="32" rx="6" fill="#E5E7EB"/>
  <text x="260" y="150" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="500">Daten Indexing</text>
  <text x="328" y="150" fill="#9CA3AF" font-size="9">1–3M</text>

  <!-- Ongoing: specialized apps -->
  <line x1="348" y1="146" x2="590" y2="146" stroke="#D1D5DB" stroke-width="1.5" stroke-dasharray="4 3"/>
  <text x="430" y="141" fill="#9CA3AF" font-size="9">Spezialisierte Anwendungen</text>

  <rect x="370" y="175" width="140" height="32" rx="6" fill="#E5E7EB"/>
  <text x="440" y="195" text-anchor="middle" fill="#4B5563" font-size="10" font-weight="500">Prozess Umsetzung</text>
  <text x="518" y="195" fill="#9CA3AF" font-size="9">1–3M</text>

  <!-- Legend -->
  <circle cx="140" cy="240" r="5" fill="#6BA5F2"/>
  <text x="152" y="244" fill="#6B7280" font-size="10">Strategische Planungsschritte</text>
  <circle cx="340" cy="240" r="5" fill="#D1D5DB"/>
  <text x="352" y="244" fill="#6B7280" font-size="10">Technische Implementierungsschritte</text>

  <!-- Bottom text -->
  <text x="300" y="280" text-anchor="middle" fill="#6B7280" font-size="11" font-style="italic">Iterative Weiterentwicklung und die Erkennung weiteren Potenzials</text>
  <text x="300" y="302" text-anchor="middle" fill="#4B5563" font-size="11" font-weight="600">Prozessplanung › Prozess Umsetzung › Feedback</text>
</svg>
